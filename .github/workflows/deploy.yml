name: Deploy SMC

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Build & Deploy Frontend → GitHub Pages ────────────────────
  deploy-frontend:
    name: Frontend → GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://smc-api.onrender.com

      # Ajoute un 404.html pour gérer le routing React (SPA)
      - name: Create 404.html for SPA routing
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          publish_branch: gh-pages
          commit_message: "🚀 Deploy SMC frontend"

  # ── Notify Backend (Render auto-deploy on push) ───────────────
  notify-backend:
    name: Backend → Trigger Render deploy
    runs-on: ubuntu-latest
    needs: deploy-frontend
    if: false

    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "✓ Render deploy triggered"
