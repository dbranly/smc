<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname +
      (l.port ? ':' + l.port : '') +
      '/smc/' +
      '?p=/' + l.pathname.slice(1) +
      (l.search ? '&q=' + l.search.slice(1) : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
